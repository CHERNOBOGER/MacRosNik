name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine release tag
        id: version
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $headTags = git tag --points-at HEAD |
            Where-Object { $_ -match '^v\d+$' } |
            Sort-Object { [int]$_.Substring(1) }

          if ($headTags) {
            $tag = $headTags[-1]
            $created = 'false'
          } else {
            $latestVersion = 0

            foreach ($existingTag in (git tag --list 'v*')) {
              if ($existingTag -match '^v(?<version>\d+)$') {
                $latestVersion = [Math]::Max($latestVersion, [int]$Matches.version)
                continue
              }

              if ($existingTag -match '^v(?<version>\d+)(?:\.\d+){1,3}$') {
                $latestVersion = [Math]::Max($latestVersion, [int]$Matches.version)
              }
            }

            $tag = "v$($latestVersion + 1)"
            git tag -a $tag -m "Release $tag"
            $created = 'true'
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "created=$created" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Print resolved version
        shell: pwsh
        run: .\gradlew.bat --no-daemon printVersion

      - name: Verify signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ secrets.WINDOWS_SIGN_CERT_PFX_BASE64 }}')) {
            throw "Missing GitHub secret WINDOWS_SIGN_CERT_PFX_BASE64. Refusing to publish an unsigned Windows release."
          }
          if ([string]::IsNullOrWhiteSpace('${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}')) {
            throw "Missing GitHub secret WINDOWS_SIGN_CERT_PASSWORD. Refusing to publish an unsigned Windows release."
          }

      - name: Build release binaries
        shell: pwsh
        run: .\gradlew.bat --no-daemon test packageExe packageInstaller

      - name: Restore signing certificate
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-signing-cert.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String('${{ secrets.WINDOWS_SIGN_CERT_PFX_BASE64 }}')
          )
          "WINDOWS_SIGN_CERT_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows binaries
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
          WINDOWS_SIGN_TIMESTAMP_URL: http://timestamp.digicert.com
        run: |
          $portableExe = (Resolve-Path 'build\exe\MacRosNik\MacRosNik.exe').Path
          $appImageExe = (Resolve-Path 'build\app-image\MacRosNik\MacRosNik.exe').Path
          $installer = Get-ChildItem -Path build\installer -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "Installer file not found in build\installer."
          }

          .\.github\scripts\sign-windows.ps1 `
            -CertificatePath $env:WINDOWS_SIGN_CERT_PATH `
            -CertificatePassword $env:WINDOWS_SIGN_CERT_PASSWORD `
            -Files @($appImageExe, $portableExe, $installer.FullName) `
            -TimestampUrl $env:WINDOWS_SIGN_TIMESTAMP_URL

      - name: Prepare release assets
        shell: pwsh
        run: |
          $outputDir = Join-Path $PWD 'build\release-assets'
          if (Test-Path -LiteralPath $outputDir) {
            Remove-Item -LiteralPath $outputDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $outputDir | Out-Null

          $portableZip = Join-Path $outputDir 'MacRosNik.zip'
          Compress-Archive -Path (Join-Path $PWD 'build\exe\MacRosNik\*') -DestinationPath $portableZip

          $installer = Get-ChildItem -Path build\installer -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "Installer file not found in build\installer."
          }

          Copy-Item -LiteralPath $installer.FullName -Destination (Join-Path $outputDir ("MacRosNik-Setup" + $installer.Extension))

      - name: Push release tag
        if: steps.version.outputs.created == 'true'
        shell: pwsh
        run: git push origin refs/tags/${{ steps.version.outputs.tag }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/release-assets/*
